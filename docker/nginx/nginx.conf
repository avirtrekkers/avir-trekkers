events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # Upstream servers
    upstream api_server {
        server api:4001;
    }
    upstream user_site {
        server user-site:80;
    }
    upstream admin_portal {
        server admin-portal:80;
    }
    upstream minio_server {
        server minio:9000;
    }

    # ============================================
    # Main site: avirtrekkers.com
    # ============================================
    server {
        listen 80;
        server_name avirtrekkers.com www.avirtrekkers.com;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # API proxy
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://api_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Auth endpoints get stricter rate limiting
            location /api/auth/ {
                limit_req zone=auth burst=3 nodelay;
                proxy_pass http://api_server;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }
        }

        # MinIO storage proxy (public images)
        location /storage/ {
            rewrite ^/storage/(.*) /avir-trekkers/$1 break;
            proxy_pass http://minio_server;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Health check
        location /health {
            proxy_pass http://api_server;
        }

        # User site (everything else)
        location / {
            proxy_pass http://user_site;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ============================================
    # Admin portal: admin.avirtrekkers.com
    # ============================================
    server {
        listen 80;
        server_name admin.avirtrekkers.com;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;

        # API proxy (admin uses same API)
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://api_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MinIO storage proxy
        location /storage/ {
            rewrite ^/storage/(.*) /avir-trekkers/$1 break;
            proxy_pass http://minio_server;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Admin portal
        location / {
            proxy_pass http://admin_portal;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
